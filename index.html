<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau Tech Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f8f9fa; /* خلفية فاتحة جداً */
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px); /* نقاط خفيفة كديكور */
            background-size: 20px 20px;
        }
        /* تنسيق الهيدر */
        .header-bg {
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 2px solid #d4af37; /* خط ذهبي */
        }
        /* تنسيق أزرار الفئات */
        .cat-btn {
            background: #fff;
            color: #555;
            border: 1px solid #eee;
        }
        .cat-btn.active-cat {
            background: linear-gradient(45deg, #d4af37, #b4932a);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }
        /* كارت الوجبة */
        .menu-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }
        .menu-card:hover { transform: scale(1.02); }
        .price-tag {
            background: #fff8e1;
            color: #d4af37;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="header-bg sticky top-0 z-50">
        <div class="max-w-md mx-auto p-5 flex flex-col items-center">
            <!-- اللوغو هنا -->
            <img src="logo.png" alt="Nouveau Tech Logo" class="w-28 h-28 mb-3 object-contain drop-shadow-md">
            
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-wide">NOUVEAU TECH</h1>
            <p class="text-gray-500 text-sm mt-1">مقهى عصري | وجدة</p>
            
            <!-- شريط التمرير للفئات -->
            <div id="categories" class="flex overflow-x-auto gap-3 mt-5 pb-2 w-full scrollbar-hide snap-x">
                <button class="cat-btn active-cat px-5 py-2 rounded-xl text-sm whitespace-nowrap transition">جاري التحميل...</button>
            </div>
        </div>
    </header>

    <!-- Main Menu -->
    <main class="max-w-md mx-auto p-4">
        <div id="menu-items" class="grid gap-5">
            <!-- العناصر ستظهر هنا -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full bg-gray-900 text-white text-center py-3 z-40">
        <p class="text-xs text-gray-400">Powered by <span class="text-yellow-500">Nouveau Tech</span></p>
    </footer>

    <script>
        // ⚠️ هام: ضع رابط الـ CSV الخاص بك هنا
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIWHuGH6ncA4zp6A43RdxyxM3yibzV65Lpq4hdgc6NhVv4yjZfRpNfUFJMRbr6cP56Ds7oD9lye1B3/pub?output=tsv';

        let allData = [];

        function init() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    allData = results.data.filter(item => item.name);
                    renderCategories();
                    renderMenu('all');
                }
            });
        }

        function renderCategories() {
            const cats = ['all', ...new Set(allData.map(d => d.category))];
            const container = document.getElementById('categories');
            container.innerHTML = cats.map(c => `
                <button onclick="renderMenu('${c}')" class="cat-btn px-5 py-2 rounded-xl text-sm whitespace-nowrap transition ${c==='all'?'active-cat':''}">
                    ${c === 'all' ? '🔥 الكل' : c}
                </button>
            `).join('');
        }

        function renderMenu(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active-cat');
                if(b.textContent.includes(cat === 'all' ? 'الكل' : cat)) b.classList.add('active-cat');
            });

            const container = document.getElementById('menu-items');
            const items = cat === 'all' ? allData : allData.filter(d => d.category === cat);

            container.innerHTML = items.map(item => `
                <div class="menu-card p-4 flex gap-4 items-center">
                    <!-- صورة الوجبة -->
                    <img src="${item.image || 'placeholder.jpg'}" class="w-24 h-24 rounded-xl object-cover shadow-sm border border-gray-100" onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
                    
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-gray-800">${item.name}</h3>
                            <span class="price-tag">${item.price}</span>
                        </div>
                        <p class="text-gray-500 text-sm leading-tight">${item.desc || ''}</p>
                        ${item.extra && item.extra !== '-' ? `<p class="text-xs text-gray-400 mt-2">⚡ ${item.extra}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
